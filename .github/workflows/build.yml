name: Build and Push Author's Docker Image

on:
  push:
    branches: [ "main" ] 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Lệnh này đã được sửa để lấy mã nguồn trực tiếp từ Repo của tác giả
      - name: Checkout author's repository
        uses: actions/checkout@v3
        with:
          repository: YaoFANGUK/video-subtitle-remover
          ref: main # Lấy nhánh chính của tác giả

      # Dọn dẹp máy chủ GitHub để có chỗ trống (~30GB) nhào nặn Image
      - name: Free up disk space 
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      # Đăng nhập vào Docker Hub của bạn
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Chạy lệnh Build dựa trên Dockerfile CỦA TÁC GIẢ và đẩy lên tài khoản của bạn
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/kaggle-video-subtitle:v1