name: Build and Push Author's Docker Image

on:
  push:
    branches: [ "main" ] 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout author's repository
        uses: actions/checkout@v3
        with:
          repository: YaoFANGUK/video-subtitle-remover
          ref: main 

      - name: Free up disk space 
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile # Đã trỏ đúng vào vị trí file của tác giả
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/kaggle-video-subtitle:v1
